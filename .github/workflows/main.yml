name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Build Backend
      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/mean-backend:latest

      # Build Frontend
      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/mean-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # Pull new images
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/mean-backend:latest
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/mean-frontend:latest
            
            # Stop and remove old containers if they exist
            docker stop mean-backend mean-frontend || true
            docker rm mean-backend mean-frontend || true
            
            # Run Backend
            docker run -d --name mean-backend -p 3000:3000 ${{ secrets.DOCKER_HUB_USERNAME }}/mean-backend:latest
            
            # Run Frontend
            docker run -d --name mean-frontend -p 80:80 ${{ secrets.DOCKER_HUB_USERNAME }}/mean-frontend:latest
