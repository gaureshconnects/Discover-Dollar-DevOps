name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Images
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/frontend ./frontend
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/backend ./backend
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/frontend
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/backend

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy to VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_IP }}
          username: ubuntu
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/Discover-Dollar-DevOps
            docker-compose pull
            docker-compose up -d
